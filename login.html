<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>Login / Sign Up – Nexus Security</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <img src="image.jpeg" alt="Background" class="bg-image">

    <nav class="navbar">
        <div class="logo">
            <h1>NEXUS SECURITY</h1>
        </div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="index.html#plans">Plans</a>
            <div id="authButtonContainer"></div>   <!-- Added -->
        </div>
    </nav>

    <div class="particle-bg">
        <canvas id="particleCanvas"></canvas>
    </div>

    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h2>Welcome back</h2>
                <p>Sign in to continue your security journey</p>
            </div>

            <div class="auth-tabs">
                <button class="tab-btn active" id="loginTab">Login</button>
                <button class="tab-btn" id="signupTab">Sign Up</button>
                <div class="tab-indicator"></div>
            </div>

            <!-- Login Form -->
            <div id="loginForm" class="auth-form active">
                <div class="form-group">
                    <input type="email" id="loginEmail" placeholder="Email address" required>
                    <i class="fas fa-envelope input-icon"></i>
                </div>
                <div class="form-group">
                    <input type="password" id="loginPassword" placeholder="Password" required>
                    <i class="fas fa-lock input-icon"></i>
                </div>
                <div class="form-options">
                    <label class="checkbox">
                        <input type="checkbox" id="rememberMe"> <span>Remember me</span>
                    </label>
                    <a href="#" class="forgot-link">Forgot password?</a>
                </div>
                <button id="doLogin" class="btn-53" data-plan="login">
                    <div class="original">LOG IN</div>
                    <div class="letters">
                        <span>L</span><span>O</span><span>G</span><span>&nbsp;</span>
                        <span>I</span><span>N</span>
                    </div>
                </button>
                <p class="auth-divider">or</p>
                <button id="googleLogin" class="btn-google">
                    <i class="fab fa-google"></i> Continue with Google
                </button>
            </div>

            <!-- Signup Form -->
            <div id="signupForm" class="auth-form">
                <div class="form-group">
                    <input type="text" id="signupName" placeholder="Full name" required>
                    <i class="fas fa-user input-icon"></i>
                </div>
                <div class="form-group">
                    <input type="email" id="signupEmail" placeholder="Email address" required>
                    <i class="fas fa-envelope input-icon"></i>
                </div>
                <div class="form-group">
                    <input type="password" id="signupPassword" placeholder="Password" required>
                    <i class="fas fa-lock input-icon"></i>
                </div>
                <div class="form-group">
                    <input type="password" id="signupConfirmPassword" placeholder="Confirm password" required>
                    <i class="fas fa-check-circle input-icon"></i>
                </div>
                <button id="doSignup" class="btn-53" data-plan="signup">
                    <div class="original">SIGN UP</div>
                    <div class="letters">
                        <span>S</span><span>I</span><span>G</span><span>N</span><span>&nbsp;</span>
                        <span>U</span><span>P</span>
                    </div>
                </button>
                <p class="auth-divider">or</p>
                <button id="googleSignup" class="btn-google">
                    <i class="fab fa-google"></i> Continue with Google
                </button>
            </div>
        </div>
    </div>

    <footer>
        <p>© 2026 Nexus Security. All rights reserved. | Protecting your digital assets.</p>
    </footer>

    <script src="script.js"></script>
    <script>
        // Particle background animation (unchanged)
        const canvas = document.getElementById('particleCanvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        let animationId = null;

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2 + 1;
                this.speedX = (Math.random() - 0.5) * 0.5;
                this.speedY = (Math.random() - 0.5) * 0.5;
                this.opacity = Math.random() * 0.3 + 0.1;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                if (this.x < 0) this.x = canvas.width;
                if (this.x > canvas.width) this.x = 0;
                if (this.y < 0) this.y = canvas.height;
                if (this.y > canvas.height) this.y = 0;
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(47, 155, 155, ${this.opacity})`;
                ctx.fill();
            }
        }

        function initParticles() {
            particles = [];
            const count = Math.min(150, Math.floor(canvas.width * canvas.height / 8000));
            for (let i = 0; i < count; i++) {
                particles.push(new Particle());
            }
        }

        function animateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let p of particles) {
                p.update();
                p.draw();
            }
            animationId = requestAnimationFrame(animateParticles);
        }

        initParticles();
        animateParticles();

        window.addEventListener('beforeunload', () => {
            if (animationId) cancelAnimationFrame(animationId);
        });

        const loginTab = document.getElementById('loginTab');
        const signupTab = document.getElementById('signupTab');
        const loginForm = document.getElementById('loginForm');
        const signupForm = document.getElementById('signupForm');
        const indicator = document.querySelector('.tab-indicator');

        function updateIndicator(activeTab) {
            const tabs = document.querySelectorAll('.tab-btn');
            const activeIndex = activeTab === 'login' ? 0 : 1;
            const activeWidth = tabs[activeIndex].offsetWidth;
            const activeLeft = tabs[activeIndex].offsetLeft;
            indicator.style.width = activeWidth + 'px';
            indicator.style.left = activeLeft + 'px';
        }

        function setActiveTab(tab) {
            if (tab === 'login') {
                loginTab.classList.add('active');
                signupTab.classList.remove('active');
                loginForm.classList.add('active');
                signupForm.classList.remove('active');
                updateIndicator('login');
            } else {
                signupTab.classList.add('active');
                loginTab.classList.remove('active');
                signupForm.classList.add('active');
                loginForm.classList.remove('active');
                updateIndicator('signup');
            }
        }

        loginTab.addEventListener('click', () => setActiveTab('login'));
        signupTab.addEventListener('click', () => setActiveTab('signup'));

        window.addEventListener('load', () => {
            updateIndicator('login');
        });
        window.addEventListener('resize', () => {
            const activeTab = loginTab.classList.contains('active') ? 'login' : 'signup';
            updateIndicator(activeTab);
        });
    </script>
</body>
</html>
